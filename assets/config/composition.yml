# Transform config for the Composer (v0.9).
# defaults: per-layer. assets: per-asset override (partial; by folder name for
# characters, by file name for props/cards/backgrounds). x,y = normalized center
# (0..1); scale = fraction of frame; animation = static | pop.
defaults:
  background: { x: 0.5,  y: 0.5,  scale: 1.0,  animation: static }
  character:  { x: 0.24, y: 0.70, scale: 0.42, animation: static }
  hero:       { x: 0.5,  y: 0.5,  scale: 0.5,  animation: pop }
  card:       { x: 0.5,  y: 0.12, scale: 0.34, animation: static }

